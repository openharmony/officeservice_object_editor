{
    "jobs": [
        {
            "name": "services:object_editor_service",
            "cmds": [
                "mkdir /data/service/el2/public/object_editor_service 0700 object_editor_service object_editor_service",
                "restorecon /data/service/el2/public/object_editor_service"
            ]
        }
    ],
    "services": [
        {
            "name": "object_editor_service",
            "path": [
                "/system/bin/sa_main",
                "/system/profile/object_editor_service.json"
            ],
            "permission": [
                "ohos.permission.GET_BUNDLE_INFO_PRIVILGED",
                "ohos.permission.GRANT_URI_PERMISSION_PRIVILEGED",
                "ohos.permission.PROXY_AUTHORIZATION_URI",
                "ohos.permission.GET_DEFAULT_APPLICATION",
                "ohos.permission.START_ABILITIES_FROM_BACKGROUND"
            ],
            "permission_acls": [
                "ohos.permission.GRANT_URI_PERMISSION_PRIVILEGED",
                "ohos.permission.GET_DEFAULT_APPLICATION"
            ],
            "uid": "object_editor_service",
            "gid": [
                "object_editor_service"
            ],
            "ondemand": true,
            "sandbox": 0,
            "apl": "system_basic",
            "secon": "u:r:ohos_object_editor_service:s0",
            "jobs": {
                "on-start": "services:object_editor_service"
            }
        }
    ]
}